---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: notificationchannels.aotanami.com
spec:
  group: aotanami.com
  names:
    kind: NotificationChannel
    listKind: NotificationChannelList
    plural: notificationchannels
    singular: notificationchannel
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.type
      name: Type
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.notificationsSent
      name: Sent
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          NotificationChannel is the Schema for the notificationchannels API.
          It configures a destination for Aotanami alerts and reports.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              NotificationChannelSpec defines the desired state of NotificationChannel.
              A NotificationChannel configures a destination for alerts and reports.
            properties:
              alertManager:
                description: alertManager contains AlertManager-specific configuration.
                properties:
                  endpoint:
                    description: endpoint is the AlertManager API endpoint.
                    type: string
                  tlsInsecureSkipVerify:
                    default: false
                    description: tlsInsecureSkipVerify skips TLS verification. Use
                      only in development.
                    type: boolean
                required:
                - endpoint
                type: object
              credentialSecret:
                description: |-
                  credentialSecret is the name of the Kubernetes Secret containing provider credentials.
                  The secret must exist in the same namespace as the NotificationChannel.
                type: string
              email:
                description: email contains email configuration.
                properties:
                  fromAddress:
                    description: fromAddress is the sender email address.
                    type: string
                  recipients:
                    description: recipients is the list of email addresses to send
                      notifications to.
                    items:
                      type: string
                    minItems: 1
                    type: array
                  smtpHost:
                    description: smtpHost is the SMTP server hostname.
                    type: string
                  smtpPort:
                    default: 587
                    description: smtpPort is the SMTP server port.
                    format: int32
                    type: integer
                required:
                - fromAddress
                - recipients
                - smtpHost
                type: object
              msTeams:
                description: msTeams contains Microsoft Teams-specific configuration.
                properties:
                  webhookURLKey:
                    default: webhook-url
                    description: webhookURL key in the credential secret that contains
                      the Teams webhook URL.
                    type: string
                type: object
              pagerDuty:
                description: pagerDuty contains PagerDuty-specific configuration.
                properties:
                  defaultSeverity:
                    default: error
                    description: severity mapping from Aotanami severity to PagerDuty
                      severity.
                    enum:
                    - critical
                    - error
                    - warning
                    - info
                    type: string
                  routingKeyKey:
                    default: routing-key
                    description: routingKey key in the credential secret for PagerDuty
                      event routing.
                    type: string
                type: object
              rateLimit:
                description: rateLimit configures notification throttling.
                properties:
                  aggregateSeconds:
                    default: 30
                    description: aggregateSeconds groups alerts within this window
                      into a single notification.
                    format: int32
                    minimum: 0
                    type: integer
                  maxPerHour:
                    default: 60
                    description: maxPerHour is the maximum number of notifications
                      per hour. 0 means unlimited.
                    format: int32
                    minimum: 0
                    type: integer
                type: object
              severityFilter:
                default: medium
                description: severityFilter only sends notifications for findings
                  at or above this severity level.
                enum:
                - critical
                - high
                - medium
                - low
                - info
                type: string
              slack:
                description: slack contains Slack-specific configuration.
                properties:
                  channel:
                    description: 'channel is the Slack channel to send notifications
                      to (e.g., #aotanami-alerts).'
                    type: string
                required:
                - channel
                type: object
              telegram:
                description: telegram contains Telegram-specific configuration.
                properties:
                  chatID:
                    description: chatID is the Telegram chat ID to send messages to.
                    type: string
                required:
                - chatID
                type: object
              type:
                description: type identifies the notification provider.
                enum:
                - slack
                - msteams
                - pagerduty
                - alertmanager
                - telegram
                - whatsapp
                - webhook
                - email
                type: string
              webhook:
                description: webhook contains generic webhook configuration.
                properties:
                  headers:
                    additionalProperties:
                      type: string
                    description: headers are additional HTTP headers to include in
                      requests.
                    type: object
                  tlsInsecureSkipVerify:
                    default: false
                    description: tlsInsecureSkipVerify skips TLS verification.
                    type: boolean
                  url:
                    description: url is the HTTP(S) endpoint to POST notifications
                      to.
                    type: string
                required:
                - url
                type: object
              whatsApp:
                description: whatsApp contains WhatsApp-specific configuration.
                properties:
                  phoneNumber:
                    description: phoneNumber is the WhatsApp phone number to send
                      messages to (with country code).
                    type: string
                required:
                - phoneNumber
                type: object
            required:
            - credentialSecret
            - type
            type: object
          status:
            description: NotificationChannelStatus defines the observed state of NotificationChannel.
            properties:
              conditions:
                description: conditions represent the current state of the resource.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              lastError:
                description: lastError describes the most recent error, if any.
                type: string
              lastSentAt:
                description: lastSentAt is the timestamp of the last notification
                  sent.
                format: date-time
                type: string
              notificationsSent:
                description: notificationsSent is the total count of notifications
                  sent.
                format: int64
                type: integer
              phase:
                description: phase indicates the current channel state.
                enum:
                - Pending
                - Active
                - Error
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
