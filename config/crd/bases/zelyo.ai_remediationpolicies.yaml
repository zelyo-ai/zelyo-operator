---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: remediationpolicies.zelyo.ai
spec:
  group: zelyo.ai
  names:
    kind: RemediationPolicy
    listKind: RemediationPolicyList
    plural: remediationpolicies
    singular: remediationpolicy
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.gitOpsRepository
      name: GitOps Repo
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.remediationsApplied
      name: PRs Created
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          RemediationPolicy is the Schema for the remediationpolicies API.
          It configures how Zelyo Operator generates and submits GitOps PRs for detected violations.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              RemediationPolicySpec defines the desired state of RemediationPolicy.
              A RemediationPolicy configures how Zelyo Operator generates and submits fixes
              via GitOps when policy violations are detected.
            properties:
              autoMerge:
                default: false
                description: autoMerge when true, enables auto-merge on PRs after
                  all checks pass.
                type: boolean
              dryRun:
                default: false
                description: dryRun when true, generates fixes but does not create
                  actual PRs.
                type: boolean
              gitOpsRepository:
                description: gitOpsRepository is the name of the GitOpsRepository
                  resource to submit PRs against.
                type: string
              maxConcurrentPRs:
                default: 5
                description: maxConcurrentPRs limits the number of open PRs at any
                  time.
                format: int32
                minimum: 1
                type: integer
              prTemplate:
                description: prTemplate configures how pull requests are created.
                properties:
                  assignees:
                    description: assignees for created PRs.
                    items:
                      type: string
                    type: array
                  branchPrefix:
                    default: zelyo-operator/fix-
                    description: branchPrefix for fix branches (e.g., "zelyo-operator/fix-").
                    type: string
                  labels:
                    description: labels applied to created PRs.
                    items:
                      type: string
                    type: array
                  titlePrefix:
                    default: '[Zelyo Operator]'
                    description: titlePrefix is prepended to all PR titles (e.g.,
                      "[Zelyo Operator]").
                    type: string
                type: object
              severityFilter:
                default: high
                description: severityFilter only creates PRs for findings at or above
                  this severity level.
                enum:
                - critical
                - high
                - medium
                - low
                type: string
              targetPolicies:
                description: targetPolicies lists the SecurityPolicy names this remediation
                  applies to. Empty means all.
                items:
                  type: string
                type: array
            required:
            - gitOpsRepository
            type: object
          status:
            description: RemediationPolicyStatus defines the observed state of RemediationPolicy.
            properties:
              conditions:
                description: conditions represent the current state of the resource.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              lastRun:
                description: lastRun is the timestamp of the last remediation cycle.
                format: date-time
                type: string
              observedGeneration:
                description: observedGeneration is the most recent generation observed
                  by the controller.
                format: int64
                type: integer
              openPRs:
                description: openPRs is the count of currently open PRs.
                format: int32
                type: integer
              phase:
                description: phase indicates the current lifecycle phase.
                enum:
                - Pending
                - Active
                - Error
                type: string
              remediationsApplied:
                description: remediationsApplied is the total number of PRs successfully
                  created.
                format: int32
                type: integer
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
