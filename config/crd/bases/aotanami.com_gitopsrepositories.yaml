---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: gitopsrepositories.aotanami.com
spec:
  group: aotanami.com
  names:
    kind: GitOpsRepository
    listKind: GitOpsRepositoryList
    plural: gitopsrepositories
    singular: gitopsrepository
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.url
      name: URL
      type: string
    - jsonPath: .spec.branch
      name: Branch
      type: string
    - jsonPath: .status.detectedSourceType
      name: Source
      type: string
    - jsonPath: .status.detectedController
      name: Controller
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.driftCount
      name: Drifts
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          GitOpsRepository is the Schema for the gitopsrepositories API.
          It represents an onboarded GitOps repository for drift detection and PR-based remediation.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              GitOpsRepositorySpec defines the desired state of GitOpsRepository.
              A GitOpsRepository represents an onboarded GitOps repository that Aotanami
              uses for config drift detection and submitting remediation PRs.
            properties:
              authSecret:
                description: |-
                  authSecret is the name of the Kubernetes Secret containing authentication credentials.
                  For GitHub App, use the GitHub App credentials. For PAT, use a token.
                type: string
              branch:
                default: main
                description: branch is the target branch for PRs and drift comparison.
                type: string
              controllerRef:
                description: |-
                  controllerRef is an explicit reference to an ArgoCD Application or Flux Kustomization.
                  When set, Aotanami links directly to this resource instead of auto-discovering.
                properties:
                  name:
                    description: name is the name of the controller resource (e.g.,
                      ArgoCD Application name).
                    type: string
                  namespace:
                    description: namespace is the namespace of the controller resource.
                    type: string
                  type:
                    allOf:
                    - enum:
                      - none
                      - argocd
                      - flux
                      - auto
                    - enum:
                      - argocd
                      - flux
                    description: type is the controller type (argocd or flux).
                    type: string
                required:
                - name
                - namespace
                - type
                type: object
              controllerType:
                default: auto
                description: |-
                  controllerType identifies which GitOps controller manages this repo.
                  When set to "auto", Aotanami probes the cluster for ArgoCD or Flux CRDs.
                enum:
                - none
                - argocd
                - flux
                - auto
                type: string
              enableDriftDetection:
                default: true
                description: enableDriftDetection when true, enables comparing live
                  cluster state against repo manifests.
                type: boolean
              helm:
                description: helm contains Helm-specific configuration when sourceType
                  is "helm".
                properties:
                  chartPath:
                    description: |-
                      chartPath is the path to the Helm chart directory within the repo.
                      Defaults to the first element in spec.paths if not specified.
                    type: string
                  releaseName:
                    description: releaseName is the Helm release name to match against
                      live cluster resources.
                    type: string
                  releaseNamespace:
                    description: releaseNamespace is the namespace where the Helm
                      release is deployed.
                    type: string
                  valuesFiles:
                    description: |-
                      valuesFiles lists paths to values files relative to the repo root.
                      Files are merged in order (last wins), matching Helm conventions.
                    items:
                      type: string
                    type: array
                type: object
              kustomize:
                description: kustomize contains Kustomize-specific configuration when
                  sourceType is "kustomize".
                properties:
                  buildArgs:
                    description: buildArgs specifies additional arguments for kustomize
                      build.
                    items:
                      type: string
                    type: array
                  overlayPaths:
                    description: |-
                      overlayPaths lists the Kustomize overlay directories to build.
                      When empty, Aotanami uses spec.paths as the overlay directories.
                    items:
                      type: string
                    type: array
                type: object
              namespaceMapping:
                description: namespaceMapping maps repository paths to Kubernetes
                  namespaces for drift detection.
                items:
                  description: NamespaceMap maps a path in the GitOps repo to a Kubernetes
                    namespace.
                  properties:
                    namespace:
                      description: namespace is the Kubernetes namespace this path
                        corresponds to.
                      type: string
                    repoPath:
                      description: repoPath is the path within the git repository.
                      type: string
                  required:
                  - namespace
                  - repoPath
                  type: object
                type: array
              paths:
                description: paths lists the directories within the repo containing
                  Kubernetes manifests.
                items:
                  type: string
                minItems: 1
                type: array
              pollIntervalSeconds:
                default: 300
                description: pollIntervalSeconds is how frequently to poll the repo
                  for changes (when syncStrategy is poll).
                format: int32
                minimum: 30
                type: integer
              provider:
                default: github
                description: provider identifies the Git hosting provider.
                enum:
                - github
                - gitlab
                - bitbucket
                type: string
              sourceType:
                default: auto
                description: |-
                  sourceType defines how manifests are structured in this repository.
                  When set to "auto", Aotanami scans paths for Chart.yaml (Helm) or
                  kustomization.yaml (Kustomize) and falls back to raw YAML.
                enum:
                - raw
                - helm
                - kustomize
                - auto
                type: string
              syncStrategy:
                default: poll
                description: syncStrategy defines how Aotanami syncs with the repository.
                enum:
                - poll
                - webhook
                type: string
              url:
                description: url is the Git repository URL (HTTPS or SSH).
                type: string
            required:
            - authSecret
            - paths
            - url
            type: object
          status:
            description: GitOpsRepositoryStatus defines the observed state of GitOpsRepository.
            properties:
              conditions:
                description: conditions represent the current state of the resource.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              detectedController:
                description: |-
                  detectedController is the GitOps controller that Aotanami auto-detected.
                  Only populated when spec.controllerType is "auto".
                enum:
                - none
                - argocd
                - flux
                - auto
                type: string
              detectedSourceType:
                description: |-
                  detectedSourceType is the manifest source type that Aotanami auto-detected.
                  Only populated when spec.sourceType is "auto".
                enum:
                - raw
                - helm
                - kustomize
                - auto
                type: string
              discoveredApplications:
                description: |-
                  discoveredApplications is the number of ArgoCD/Flux applications
                  found that reference this repository.
                format: int32
                type: integer
              discoveredManifests:
                description: discoveredManifests is the number of K8s manifests discovered
                  in the repo.
                format: int32
                type: integer
              driftCount:
                description: driftCount is the number of resources with config drift
                  from the repo.
                format: int32
                type: integer
              lastError:
                description: lastError describes the most recent sync error, if any.
                type: string
              lastSyncTime:
                description: lastSyncTime is when the repo was last synced.
                format: date-time
                type: string
              lastSyncedCommit:
                description: lastSyncedCommit is the SHA of the last successfully
                  synced commit.
                type: string
              observedGeneration:
                description: observedGeneration is the most recent generation observed
                  by the controller.
                format: int64
                type: integer
              phase:
                description: phase indicates the current lifecycle phase.
                enum:
                - Pending
                - Syncing
                - Synced
                - Discovering
                - Error
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
