---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: zelyoconfigs.zelyo.ai
spec:
  group: zelyo.ai
  names:
    kind: ZelyoConfig
    listKind: ZelyoConfigList
    plural: zelyoconfigs
    singular: zelyoconfig
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.mode
      name: Mode
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .spec.llm.provider
      name: LLM Provider
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          ZelyoConfig is the Schema for the zelyoconfigs API.
          It is the global configuration resource for the Zelyo Operator.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              ZelyoConfigSpec defines the desired state of ZelyoConfig.
              ZelyoConfig is the global configuration resource for the Zelyo Operator.
              Only one ZelyoConfig resource should exist per cluster.
            properties:
              dashboard:
                description: dashboard configures the embedded web dashboard.
                properties:
                  basePath:
                    default: /
                    description: basePath is the URL path prefix for the dashboard
                      (e.g., "/dashboard").
                    type: string
                  enabled:
                    default: true
                    description: enabled toggles the embedded dashboard.
                    type: boolean
                  port:
                    default: 8080
                    description: port is the HTTP port for the dashboard.
                    format: int32
                    maximum: 65535
                    minimum: 1
                    type: integer
                type: object
              github:
                description: github configures the GitHub App integration for PR-based
                  remediation.
                properties:
                  appID:
                    description: appID is the GitHub App installation ID.
                    format: int64
                    type: integer
                  installationID:
                    description: installationID is the GitHub App installation ID
                      for the target organization.
                    format: int64
                    type: integer
                  privateKeySecret:
                    description: privateKeySecret is the name of the Secret containing
                      the GitHub App private key.
                    type: string
                required:
                - appID
                - installationID
                - privateKeySecret
                type: object
              llm:
                description: llm configures the LLM provider for AI-powered diagnosis
                  and remediation.
                properties:
                  apiKeySecret:
                    description: |-
                      apiKeySecret is the name of the Kubernetes Secret containing the API key.
                      The key within the secret should be named "api-key".
                    type: string
                  endpoint:
                    description: endpoint is a custom API endpoint URL. Required for
                      'custom' and 'ollama' providers.
                    type: string
                  maxTokensPerRequest:
                    default: 4096
                    description: maxTokensPerRequest limits the max tokens per individual
                      LLM request.
                    format: int32
                    minimum: 100
                    type: integer
                  model:
                    description: model is the model identifier (e.g., "anthropic/claude-sonnet-4-20250514",
                      "gpt-4o").
                    type: string
                  provider:
                    description: provider identifies the LLM service provider.
                    enum:
                    - openrouter
                    - openai
                    - anthropic
                    - azure-openai
                    - ollama
                    - custom
                    type: string
                  temperature:
                    description: |-
                      temperature controls the randomness of LLM outputs (0.0 = deterministic, 1.0 = creative).
                      Valid range: 0.0 to 2.0. If not set, defaults to provider default.
                    type: number
                required:
                - apiKeySecret
                - model
                - provider
                type: object
              mode:
                default: audit
                description: mode sets the default operating mode for the operator.
                enum:
                - audit
                - protect
                type: string
              multiCluster:
                description: multiCluster enables multi-cluster federation.
                properties:
                  clusterName:
                    description: clusterName is the unique name of this cluster in
                      the federation.
                    type: string
                  enabled:
                    default: false
                    description: enabled toggles multi-cluster mode.
                    type: boolean
                  hubEndpoint:
                    description: hubEndpoint is the API endpoint of the hub cluster
                      for aggregation.
                    type: string
                type: object
              telemetry:
                description: telemetry configures metrics and tracing export.
                properties:
                  otelEnabled:
                    default: false
                    description: otelEnabled enables OpenTelemetry tracing.
                    type: boolean
                  otelEndpoint:
                    description: otelEndpoint is the OTLP collector endpoint.
                    type: string
                  prometheusEnabled:
                    default: true
                    description: prometheusEnabled enables Prometheus metrics export.
                    type: boolean
                type: object
              tokenBudget:
                description: tokenBudget configures token usage limits to control
                  LLM API costs.
                properties:
                  alertThresholdPercent:
                    default: 80
                    description: alertThresholdPercent triggers a notification when
                      usage reaches this percentage of the limit.
                    format: int32
                    maximum: 100
                    minimum: 1
                    type: integer
                  batchingEnabled:
                    default: true
                    description: batchingEnabled enables batching of multiple findings
                      into single LLM calls.
                    type: boolean
                  dailyTokenLimit:
                    default: 500000
                    description: dailyTokenLimit is the max tokens per day. 0 means
                      unlimited.
                    format: int64
                    type: integer
                  enableCaching:
                    default: true
                    description: enableCaching enables prompt/response caching to
                      reduce redundant LLM calls.
                    type: boolean
                  hourlyTokenLimit:
                    default: 50000
                    description: hourlyTokenLimit is the max tokens per hour. 0 means
                      unlimited.
                    format: int64
                    type: integer
                  monthlyTokenLimit:
                    default: 10000000
                    description: monthlyTokenLimit is the max tokens per month. 0
                      means unlimited.
                    format: int64
                    type: integer
                type: object
            required:
            - llm
            type: object
          status:
            description: ZelyoConfigStatus defines the observed state of ZelyoConfig.
            properties:
              activeMode:
                description: mode is the currently active operating mode.
                type: string
              conditions:
                description: conditions represent the current state of the resource.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              lastReconciled:
                description: lastReconciled is when the config was last reconciled.
                format: date-time
                type: string
              observedGeneration:
                description: observedGeneration is the most recent generation observed
                  by the controller.
                format: int64
                type: integer
              phase:
                description: phase indicates the current agent lifecycle phase.
                enum:
                - Initializing
                - Active
                - Degraded
                - Error
                type: string
              tokenUsage:
                description: tokenUsage tracks current LLM token consumption.
                properties:
                  estimatedCostUSD:
                    description: estimatedCostUSD is the estimated cost based on provider
                      pricing.
                    type: string
                  tokensUsedThisMonth:
                    description: tokensUsedThisMonth is the token count for the current
                      month.
                    format: int64
                    type: integer
                  tokensUsedToday:
                    description: tokensUsedToday is the token count for the current
                      day.
                    format: int64
                    type: integer
                type: object
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
