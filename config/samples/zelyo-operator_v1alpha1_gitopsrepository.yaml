# Plain YAML manifests with auto-detection.
apiVersion: zelyo.ai/v1alpha1
kind: GitOpsRepository
metadata:
  labels:
    app.kubernetes.io/name: zelyo-operator
    app.kubernetes.io/managed-by: kustomize
  name: gitopsrepository-sample
  namespace: zelyo-system
spec:
  url: https://github.com/my-org/k8s-manifests
  branch: main
  paths: ["clusters/production/", "clusters/staging/"]
  provider: github
  authSecret: github-creds
  syncStrategy: poll
  pollIntervalSeconds: 300
  enableDriftDetection: true
  sourceType: auto        # Auto-detect Helm/Kustomize/raw
  controllerType: auto    # Auto-detect ArgoCD/Flux
  namespaceMapping:
    - repoPath: "clusters/production/"
      namespace: production
---
# Helm chart with ArgoCD controller reference.
apiVersion: zelyo.ai/v1alpha1
kind: GitOpsRepository
metadata:
  labels:
    app.kubernetes.io/name: zelyo-operator
    app.kubernetes.io/managed-by: kustomize
  name: gitopsrepository-helm-argocd
  namespace: zelyo-system
spec:
  url: https://github.com/my-org/helm-charts
  branch: main
  paths: ["charts/frontend/"]
  provider: github
  authSecret: github-creds
  sourceType: helm
  controllerType: argocd
  controllerRef:
    type: argocd
    name: frontend-app
    namespace: argocd
  helm:
    chartPath: "charts/frontend/"
    valuesFiles:
      - "charts/frontend/values.yaml"
      - "charts/frontend/values-production.yaml"
    releaseName: frontend
    releaseNamespace: production
  enableDriftDetection: true
---
# Kustomize overlays with Flux controller reference.
apiVersion: zelyo.ai/v1alpha1
kind: GitOpsRepository
metadata:
  labels:
    app.kubernetes.io/name: zelyo-operator
    app.kubernetes.io/managed-by: kustomize
  name: gitopsrepository-kustomize-flux
  namespace: zelyo-system
spec:
  url: https://github.com/my-org/platform-config
  branch: main
  paths: ["overlays/production/"]
  provider: github
  authSecret: github-creds
  sourceType: kustomize
  controllerType: flux
  controllerRef:
    type: flux
    name: production-kustomization
    namespace: flux-system
  kustomize:
    overlayPaths:
      - "overlays/production/"
      - "overlays/production/monitoring/"
    buildArgs:
      - "--enable-helm"
  enableDriftDetection: true
