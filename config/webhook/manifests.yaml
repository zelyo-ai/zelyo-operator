---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: mutating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /mutate-aotanami-zelyo-ai-v1alpha1-securitypolicy
  failurePolicy: Fail
  name: msecuritypolicy-v1alpha1.kb.io
  rules:
  - apiGroups:
    - aotanami.com
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - securitypolicies
  sideEffects: None
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-aotanami-zelyo-ai-v1alpha1-securitypolicy
  failurePolicy: Fail
  name: vsecuritypolicy-v1alpha1.kb.io
  rules:
  - apiGroups:
    - aotanami.com
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - securitypolicies
  sideEffects: None
