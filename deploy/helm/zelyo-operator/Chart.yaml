apiVersion: v2
name: zelyo-operator
description: Zelyo Operator — Autonomous AI Security Agent for Kubernetes — Detect, Correlate, Fix
type: application
version: 0.0.0-dev
appVersion: "0.0.0-dev"
kubeVersion: ">=1.26.0-0"
home: https://github.com/zelyo-ai/zelyo-operator
icon: https://raw.githubusercontent.com/zelyo-ai/zelyo/main/docs/assets/icon.png
sources:
  - https://github.com/zelyo-ai/zelyo-operator
maintainers:
  - name: Zelyo AI
    email: engineering@zelyo.ai
    url: https://zelyo.ai
keywords:
  - kubernetes
  - security
  - monitoring
  - ai
  - operator
  - gitops
  - compliance
  - devsecops
  - cost-optimization
  - autonomous
  - cnapp
  - cloud-security
  - cspm
  - kspm
annotations:
  org.opencontainers.image.source: https://github.com/zelyo-ai/zelyo-operator
  org.opencontainers.image.description: "Zelyo Operator — Autonomous AI Security Agent for Kubernetes — Detect, Correlate, Fix"
  org.opencontainers.image.licenses: Apache-2.0
  artifacthub.io/license: Apache-2.0
  artifacthub.io/operator: "true"
  artifacthub.io/operatorCapabilities: "Full Lifecycle"
  artifacthub.io/crds: |
    - kind: ZelyoConfig
      version: v1alpha1
      name: zelyoconfigs.zelyo.ai
      description: Global operator configuration (singleton)
    - kind: SecurityPolicy
      version: v1alpha1
      name: securitypolicies.zelyo.ai
      description: Defines security rules evaluated against workloads
    - kind: ClusterScan
      version: v1alpha1
      name: clusterscans.zelyo.ai
      description: Scheduled cluster-wide security scans
    - kind: ScanReport
      version: v1alpha1
      name: scanreports.zelyo.ai
      description: Immutable scan result records
    - kind: CostPolicy
      version: v1alpha1
      name: costpolicies.zelyo.ai
      description: Cost optimization and resource rightsizing
    - kind: MonitoringPolicy
      version: v1alpha1
      name: monitoringpolicies.zelyo.ai
      description: Real-time workload monitoring rules
    - kind: NotificationChannel
      version: v1alpha1
      name: notificationchannels.zelyo.ai
      description: Alert delivery channels (Slack, Teams, etc.)
    - kind: RemediationPolicy
      version: v1alpha1
      name: remediationpolicies.zelyo.ai
      description: Auto-remediation via GitOps PRs
    - kind: GitOpsRepository
      version: v1alpha1
      name: gitopsrepositories.zelyo.ai
      description: GitOps repository connections
    - kind: CloudAccountConfig
      version: v1alpha1
      name: cloudaccountconfigs.zelyo.ai
      description: Cloud provider account onboarding for multi-cloud scanning
  artifacthub.io/changes: |
    - kind: added
      description: "CloudAccountConfig CRD: onboard AWS/GCP/Azure accounts for cloud security scanning"
    - kind: added
      description: "48 cloud security scanners across CSPM, CIEM, Network, DSPM, Supply Chain, CI/CD Pipeline"
    - kind: added
      description: "SOC 2, PCI-DSS, and HIPAA compliance controls mapped to cloud findings"
    - kind: added
      description: "Cloud IaC remediation (Terraform/CloudFormation) via LLM-powered fix generation"
    - kind: added
      description: "AWS SDK v2 integration with IRSA, Workload Identity, and Pod Identity support"
  artifacthub.io/containsSecurityUpdates: "false"
  artifacthub.io/prerelease: "true"
