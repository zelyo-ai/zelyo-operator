apiVersion: v2
name: zelyo-operator
description: Zelyo Operator — Autonomous Kubernetes Protection powered by Agentic AI
type: application
version: 0.0.1
appVersion: "0.0.1"
kubeVersion: ">=1.26.0-0"
home: https://github.com/zelyo-ai/zelyo-operator
icon: https://raw.githubusercontent.com/zelyo-ai/zelyo-operator/main/docs/assets/icon.png
sources:
  - https://github.com/zelyo-ai/zelyo-operator
maintainers:
  - name: Zelyo AI
    email: engineering@zelyo.ai
    url: https://zelyo.ai
keywords:
  - kubernetes
  - security
  - monitoring
  - ai
  - operator
  - gitops
  - compliance
  - devsecops
  - cost-optimization
  - autonomous
annotations:
  org.opencontainers.image.source: https://github.com/zelyo-ai/zelyo-operator
  org.opencontainers.image.description: "Zelyo Operator — Autonomous Kubernetes Protection"
  org.opencontainers.image.licenses: Apache-2.0
  artifacthub.io/license: Apache-2.0
  artifacthub.io/operator: "true"
  artifacthub.io/operatorCapabilities: "Full Lifecycle"
  artifacthub.io/crds: |
    - kind: ZelyoConfig
      version: v1alpha1
      name: zelyoconfigs.zelyo.ai
      description: Global operator configuration (singleton)
    - kind: SecurityPolicy
      version: v1alpha1
      name: securitypolicies.zelyo.ai
      description: Defines security rules evaluated against workloads
    - kind: ClusterScan
      version: v1alpha1
      name: clusterscans.zelyo.ai
      description: Scheduled cluster-wide security scans
    - kind: ScanReport
      version: v1alpha1
      name: scanreports.zelyo.ai
      description: Immutable scan result records
    - kind: CostPolicy
      version: v1alpha1
      name: costpolicies.zelyo.ai
      description: Cost optimization and resource rightsizing
    - kind: MonitoringPolicy
      version: v1alpha1
      name: monitoringpolicies.zelyo.ai
      description: Real-time workload monitoring rules
    - kind: NotificationChannel
      version: v1alpha1
      name: notificationchannels.zelyo.ai
      description: Alert delivery channels (Slack, Teams, etc.)
    - kind: RemediationPolicy
      version: v1alpha1
      name: remediationpolicies.zelyo.ai
      description: Auto-remediation via GitOps PRs
    - kind: GitOpsRepository
      version: v1alpha1
      name: gitopsrepositories.zelyo.ai
      description: GitOps repository connections
  artifacthub.io/changes: |
    - kind: added
      description: Initial release with 9 CRDs and 8 built-in security scanners
  artifacthub.io/containsSecurityUpdates: "false"
  artifacthub.io/prerelease: "true"
