{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "zelyo-operator.fullname" . }}
  namespace: {{ include "zelyo-operator.namespace" . }}
  labels:
    {{- include "zelyo-operator.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "zelyo-operator.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow metrics scraping
    {{- if .Values.metrics.service.enabled }}
    - ports:
        - port: {{ (split ":" .Values.metrics.bindAddress)._1 | default 8443 }}
          protocol: TCP
      {{- with .Values.networkPolicy.ingress.metricsFrom }}
      from:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    {{- end }}

    # Allow webhook calls from API server
    {{- if .Values.webhook.enabled }}
    - ports:
        - port: {{ .Values.webhook.port }}
          protocol: TCP
      {{- with .Values.networkPolicy.ingress.webhookFrom }}
      from:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    {{- end }}

    # Allow health probes
    - ports:
        - port: {{ (split ":" .Values.healthProbes.bindAddress)._1 | default 8081 }}
          protocol: TCP

    # Allow dashboard access
    {{- if .Values.config.dashboard.enabled }}
    - ports:
        - port: {{ .Values.config.dashboard.port }}
          protocol: TCP
    {{- end }}

  egress:
    # Allow DNS
    {{- if .Values.networkPolicy.egress.dns }}
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    {{- end }}

    # Allow Kubernetes API
    {{- if .Values.networkPolicy.egress.kubeAPI }}
    - ports:
        - port: 443
          protocol: TCP
        - port: 6443
          protocol: TCP
    {{- end }}

    # Additional egress rules (LLM APIs, GitHub, etc.)
    {{- with .Values.networkPolicy.egress.extraRules }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
