apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "zelyo-operator.fullname" . }}-config
  namespace: {{ include "zelyo-operator.namespace" . }}
  labels:
    {{- include "zelyo-operator.labels" . | nindent 4 }}
data:
  # ── Dashboard ──
  # These env vars are read by cmd/main.go to configure the dashboard server.
  ZELYO_OPERATOR_DASHBOARD_ENABLED: {{ .Values.config.dashboard.enabled | quote }}
  ZELYO_OPERATOR_DASHBOARD_PORT: {{ .Values.config.dashboard.port | quote }}
  ZELYO_OPERATOR_DASHBOARD_BASE_PATH: {{ .Values.config.dashboard.basePath | quote }}
