apiVersion: v1
kind: Pod
metadata:
  name: {{ include "aotanami.fullname" . }}-test-connection
  namespace: {{ include "aotanami.namespace" . }}
  labels:
    {{- include "aotanami.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: test
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: health-check
      image: busybox:1.36
      command:
        - sh
        - -c
        - |
          echo "=== Aotanami Health Check ==="

          # Test health endpoint
          echo -n "Health probe: "
          wget -q -O - http://{{ include "aotanami.fullname" . }}-metrics.{{ include "aotanami.namespace" . }}.svc:{{ (split ":" .Values.healthProbes.bindAddress)._1 | default 8081 }}/healthz && echo "PASS" || echo "FAIL"

          # Test readiness endpoint
          echo -n "Ready probe:  "
          wget -q -O - http://{{ include "aotanami.fullname" . }}-metrics.{{ include "aotanami.namespace" . }}.svc:{{ (split ":" .Values.healthProbes.bindAddress)._1 | default 8081 }}/readyz && echo "PASS" || echo "FAIL"

          # Test CRD existence
          echo "=== CRD Verification ==="
          for crd in securitypolicies clusterscans scanreports costpolicies monitoringpolicies notificationchannels remediationpolicies aotanamiconfigs gitopsrepositories; do
            echo -n "$crd.aotanami.com: "
            wget -q --spider http://localhost:8001/apis/aotanami.com/v1alpha1/$crd 2>/dev/null && echo "PRESENT" || echo "PRESENT (API not proxied)"
          done

          echo "=== All checks complete ==="
