{{- if .Values.metrics.prometheusRule.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "aotanami.fullname" . }}
  namespace: {{ .Values.metrics.prometheusRule.namespace | default (include "aotanami.namespace" .) }}
  labels:
    {{- include "aotanami.labels" . | nindent 4 }}
    {{- with .Values.metrics.prometheusRule.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  groups:
    - name: aotanami.rules
      rules:
        - alert: AotanamiCriticalViolations
          expr: aotanami_scanner_findings_total{severity="critical"} > 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Critical security violations detected"
            description: >-
              Scanner {{ "{{" }} $labels.scanner {{ "}}" }} found
              {{ "{{" }} $value {{ "}}" }} critical findings.
            runbook_url: https://github.com/aotanami/aotanami/blob/main/docs/runbooks/critical-violations.md

        - alert: AotanamiReconcileErrors
          expr: rate(aotanami_controller_reconcile_total{result="error"}[5m]) > 0.1
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Aotanami controller has high error rate"
            description: >-
              Controller {{ "{{" }} $labels.controller {{ "}}" }} has a reconcile
              error rate of {{ "{{" }} $value {{ "}}" }}/s over the last 5 minutes.

        - alert: AotanamiSlowReconcile
          expr: histogram_quantile(0.99, rate(aotanami_controller_reconcile_duration_seconds_bucket[5m])) > 30
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Aotanami controller reconcile is slow"
            description: >-
              Controller {{ "{{" }} $labels.controller {{ "}}" }} p99 reconcile latency
              is {{ "{{" }} $value {{ "}}" }}s.

        - alert: AotanamiPodRestart
          expr: increase(kube_pod_container_status_restarts_total{container="manager", namespace="{{ include "aotanami.namespace" . }}"}[1h]) > 3
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Aotanami operator is restarting frequently"
            description: 'The operator has restarted {{ "{{" }} $value {{ "}}" }} times in the last hour.'
{{- end }}
