{{- if .Values.webhook.enabled }}
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: {{ include "aotanami.fullname" . }}
  labels:
    {{- include "aotanami.labels" . | nindent 4 }}
  {{- if .Values.webhook.certManager.enabled }}
  annotations:
    cert-manager.io/inject-ca-from: {{ include "aotanami.namespace" . }}/{{ include "aotanami.webhookCertSecret" . }}
  {{- end }}
webhooks:
  - name: vsecuritypolicy.aotanami.com
    admissionReviewVersions:
      - v1
    clientConfig:
      service:
        name: {{ include "aotanami.webhookServiceName" . }}
        namespace: {{ include "aotanami.namespace" . }}
        path: /validate-aotanami-com-v1alpha1-securitypolicy
        port: 443
    failurePolicy: {{ .Values.webhook.failurePolicy }}
    timeoutSeconds: {{ .Values.webhook.timeoutSeconds }}
    rules:
      - apiGroups:
          - aotanami.com
        apiVersions:
          - v1alpha1
        operations:
          - CREATE
          - UPDATE
        resources:
          - securitypolicies
    sideEffects: None
---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: {{ include "aotanami.fullname" . }}
  labels:
    {{- include "aotanami.labels" . | nindent 4 }}
  {{- if .Values.webhook.certManager.enabled }}
  annotations:
    cert-manager.io/inject-ca-from: {{ include "aotanami.namespace" . }}/{{ include "aotanami.webhookCertSecret" . }}
  {{- end }}
webhooks:
  - name: msecuritypolicy.aotanami.com
    admissionReviewVersions:
      - v1
    clientConfig:
      service:
        name: {{ include "aotanami.webhookServiceName" . }}
        namespace: {{ include "aotanami.namespace" . }}
        path: /mutate-aotanami-com-v1alpha1-securitypolicy
        port: 443
    failurePolicy: {{ .Values.webhook.failurePolicy }}
    timeoutSeconds: {{ .Values.webhook.timeoutSeconds }}
    rules:
      - apiGroups:
          - aotanami.com
        apiVersions:
          - v1alpha1
        operations:
          - CREATE
          - UPDATE
        resources:
          - securitypolicies
    sideEffects: None
---
{{- if .Values.webhook.certManager.enabled }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "aotanami.webhookCertSecret" . }}
  namespace: {{ include "aotanami.namespace" . }}
  labels:
    {{- include "aotanami.labels" . | nindent 4 }}
spec:
  secretName: {{ include "aotanami.webhookCertSecret" . }}
  dnsNames:
    - {{ include "aotanami.webhookServiceName" . }}.{{ include "aotanami.namespace" . }}.svc
    - {{ include "aotanami.webhookServiceName" . }}.{{ include "aotanami.namespace" . }}.svc.cluster.local
  issuerRef:
    kind: {{ .Values.webhook.certManager.issuerKind }}
    {{- if .Values.webhook.certManager.issuerName }}
    name: {{ .Values.webhook.certManager.issuerName }}
    {{- else }}
    name: {{ include "aotanami.fullname" . }}-selfsigned
    {{- end }}
{{- if not .Values.webhook.certManager.issuerName }}
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: {{ include "aotanami.fullname" . }}-selfsigned
  namespace: {{ include "aotanami.namespace" . }}
  labels:
    {{- include "aotanami.labels" . | nindent 4 }}
spec:
  selfSigned: {}
{{- end }}
{{- end }}
{{- end }}
