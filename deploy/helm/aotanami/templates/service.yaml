apiVersion: v1
kind: Service
metadata:
  name: {{ include "aotanami.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aotanami.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: dashboard
      protocol: TCP
      name: dashboard
    - port: 8443
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    {{- include "aotanami.selectorLabels" . | nindent 4 }}
