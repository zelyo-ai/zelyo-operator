---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: monitoringpolicies.aotanami.com
spec:
  group: aotanami.com
  names:
    kind: MonitoringPolicy
    listKind: MonitoringPolicyList
    plural: monitoringpolicies
    singular: monitoringpolicy
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.activeIncidents
      name: Active Incidents
      type: integer
    - jsonPath: .status.eventsProcessed
      name: Events Processed
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          MonitoringPolicy is the Schema for the monitoringpolicies API.
          It configures real-time monitoring, event filtering, log analysis, and anomaly detection.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              MonitoringPolicySpec defines the desired state of MonitoringPolicy.
              A MonitoringPolicy configures real-time monitoring of Kubernetes events,
              pod logs, node conditions, and anomaly detection thresholds.
            properties:
              anomalyDetection:
                description: anomalyDetection configures the anomaly detection engine.
                properties:
                  baselineDurationHours:
                    default: 168
                    description: baselineDurationHours is how many hours of data to
                      use for baseline calculation.
                    format: int32
                    minimum: 1
                    type: integer
                  enabled:
                    default: true
                    description: enabled toggles anomaly detection.
                    type: boolean
                  sensitivityPercent:
                    default: 80
                    description: sensitivityPercent controls how sensitive anomaly
                      detection is (lower = more sensitive).
                    format: int32
                    maximum: 100
                    minimum: 1
                    type: integer
                type: object
              eventFilters:
                description: eventFilters configures which Kubernetes events to watch.
                properties:
                  involvedObjectKinds:
                    description: involvedObjectKinds filters events by the kind of
                      involved object.
                    items:
                      type: string
                    type: array
                  reasons:
                    description: reasons filters events by reason (e.g., OOMKilled,
                      CrashLoopBackOff, FailedScheduling).
                    items:
                      type: string
                    type: array
                  types:
                    default:
                    - Warning
                    description: types lists the event types to watch (Normal, Warning).
                    items:
                      type: string
                    type: array
                type: object
              logMonitoring:
                description: logMonitoring configures pod log streaming and pattern
                  matching.
                properties:
                  enabled:
                    default: true
                    description: enabled toggles log monitoring.
                    type: boolean
                  excludeContainers:
                    description: excludeContainers excludes specific container names
                      from log monitoring.
                    items:
                      type: string
                    type: array
                  patterns:
                    description: patterns defines regex patterns to watch for in logs.
                    items:
                      description: LogPattern defines a pattern to match in pod logs.
                      properties:
                        name:
                          description: name is a human-readable identifier for this
                            pattern.
                          type: string
                        regex:
                          description: regex is the regular expression pattern to
                            match.
                          type: string
                        severity:
                          default: medium
                          description: severity assigned when this pattern matches.
                          enum:
                          - critical
                          - high
                          - medium
                          - low
                          - info
                          type: string
                      required:
                      - name
                      - regex
                      type: object
                    type: array
                type: object
              nodeMonitoring:
                description: nodeMonitoring configures node condition monitoring.
                properties:
                  conditions:
                    default:
                    - MemoryPressure
                    - DiskPressure
                    - PIDPressure
                    - NetworkUnavailable
                    description: conditions lists node conditions to watch (e.g.,
                      MemoryPressure, DiskPressure, PIDPressure).
                    items:
                      type: string
                    type: array
                  enabled:
                    default: true
                    description: enabled toggles node monitoring.
                    type: boolean
                type: object
              notificationChannels:
                description: notificationChannels lists NotificationChannel names
                  for monitoring alerts.
                items:
                  type: string
                type: array
              targetNamespaces:
                description: targetNamespaces restricts monitoring to specific namespaces.
                  Empty means all.
                items:
                  type: string
                type: array
            type: object
          status:
            description: MonitoringPolicyStatus defines the observed state of MonitoringPolicy.
            properties:
              activeIncidents:
                description: activeIncidents is the count of currently active incidents.
                format: int32
                type: integer
              conditions:
                description: conditions represent the current state of the resource.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              eventsProcessed:
                description: eventsProcessed is the total number of events processed.
                format: int64
                type: integer
              lastEventTime:
                description: lastEventTime is the timestamp of the last processed
                  event.
                format: date-time
                type: string
              observedGeneration:
                description: observedGeneration is the most recent generation observed
                  by the controller.
                format: int64
                type: integer
              phase:
                description: phase indicates the current lifecycle phase.
                enum:
                - Pending
                - Active
                - Error
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
