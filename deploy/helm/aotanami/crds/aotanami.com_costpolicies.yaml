---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: costpolicies.aotanami.com
spec:
  group: aotanami.com
  names:
    kind: CostPolicy
    listKind: CostPolicyList
    plural: costpolicies
    singular: costpolicy
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.resizeStrategy
      name: Strategy
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.estimatedMonthlyCostUSD
      name: Est. Monthly
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          CostPolicy is the Schema for the costpolicies API.
          It configures cost monitoring, budget alerts, and workload rightsizing rules.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              CostPolicySpec defines the desired state of CostPolicy.
              A CostPolicy configures cost monitoring thresholds and workload
              rightsizing rules for targeted namespaces.
            properties:
              budgetLimits:
                description: budgetLimits defines cost budget thresholds for alerting.
                properties:
                  costIncreaseThresholdPercent:
                    default: 20
                    description: costIncreaseThresholdPercent triggers an alert when
                      costs increase by this percentage.
                    format: int32
                    maximum: 100
                    minimum: 1
                    type: integer
                  dailyBudgetUSD:
                    description: dailyBudgetUSD is the maximum daily cost in USD before
                      alerting.
                    type: string
                  monthlyBudgetUSD:
                    description: monthlyBudgetUSD is the maximum monthly cost in USD
                      before alerting.
                    type: string
                type: object
              idleDetection:
                description: idleDetection configures idle workload detection.
                properties:
                  cpuThresholdPercent:
                    default: 5
                    description: cpuThresholdPercent — a workload using less than
                      this % CPU is considered idle.
                    format: int32
                    maximum: 50
                    minimum: 1
                    type: integer
                  enabled:
                    default: true
                    description: enabled toggles idle workload detection.
                    type: boolean
                  idleDurationMinutes:
                    default: 60
                    description: idleDurationMinutes — the workload must be idle for
                      this many minutes before flagging.
                    format: int32
                    minimum: 5
                    type: integer
                  memoryThresholdPercent:
                    default: 5
                    description: memoryThresholdPercent — a workload using less than
                      this % memory is considered idle.
                    format: int32
                    maximum: 50
                    minimum: 1
                    type: integer
                type: object
              notificationChannels:
                description: notificationChannels lists NotificationChannel names
                  for cost alerts.
                items:
                  type: string
                type: array
              resizeStrategy:
                default: conservative
                description: resizeStrategy defines how workloads should be rightsized.
                enum:
                - conservative
                - moderate
                - aggressive
                type: string
              targetNamespaces:
                description: targetNamespaces restricts cost monitoring to specific
                  namespaces. Empty means all.
                items:
                  type: string
                type: array
            type: object
          status:
            description: CostPolicyStatus defines the observed state of CostPolicy.
            properties:
              conditions:
                description: conditions represent the current state of the resource.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              estimatedMonthlyCostUSD:
                description: estimatedMonthlyCostUSD is the current estimated monthly
                  cost.
                type: string
              idleWorkloads:
                description: idleWorkloads is the count of detected idle workloads.
                format: int32
                type: integer
              lastEvaluated:
                description: lastEvaluated is the timestamp of the last cost evaluation.
                format: date-time
                type: string
              observedGeneration:
                description: observedGeneration is the most recent generation observed
                  by the controller.
                format: int64
                type: integer
              phase:
                description: phase indicates the current lifecycle phase.
                enum:
                - Pending
                - Active
                - Error
                type: string
              rightsizingRecommendations:
                description: rightsizingRecommendations is the count of pending rightsizing
                  recommendations.
                format: int32
                type: integer
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
