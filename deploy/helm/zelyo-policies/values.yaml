# ---------------------------------------------------------------------------
# GitOps Repositories — drift detection and PR submission
# ---------------------------------------------------------------------------
gitops:
  enabled: false
  repositories: []
  # - name: infra-repo
  #   url: https://github.com/my-org/k8s-manifests
  #   branch: main
  #   paths: ["clusters/production/"]
  #   provider: github             # github | gitlab | bitbucket
  #   authSecret: github-creds
  #   enableDriftDetection: true
  #   sourceType: auto             # auto | raw | helm | kustomize
  #   controllerType: auto         # auto | none | argocd | flux
  #   pollIntervalSeconds: 300

# ---------------------------------------------------------------------------
# Remediation Policy — automated GitOps PR creation (Protect mode)
# ---------------------------------------------------------------------------
remediation:
  enabled: false
  gitOpsRepository: ""             # Must reference a gitops.repositories[].name
  severityFilter: high
  dryRun: true                     # Safe default — preview fixes without PRs
  maxConcurrentPRs: 3
  autoMerge: false
  targetPolicies: []               # Empty = all SecurityPolicies
  prTemplate:
    titlePrefix: "[Zelyo Auto-Fix]"
    labels:
      - security
      - automated
    assignees: []
    branchPrefix: "zelyo/fix-"
