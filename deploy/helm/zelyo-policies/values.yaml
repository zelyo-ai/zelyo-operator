#     roleARN: "arn:aws:iam::123456789012:role/ZelyoReadOnly"
#     # secretRef: aws-creds       # For method: secret
#     # externalID: ""             # For cross-account
#   scanCategories: []             # Empty = all 6 categories (cspm, ciem, network, dspm, supply-chain, cicd-pipeline)
#   complianceFrameworks: []       # Auto-populated from compliance.presets if empty
#   schedule: "0 2 * * *"
#   historyLimit: 10

