# .golangci.yml — Production-grade linter configuration for Aotanami
# https://golangci-lint.run/usage/configuration/
# Compatible with golangci-lint v2.x

version: "2"

run:
  timeout: 5m

linters:
  # Use standard defaults (errcheck, govet, ineffassign, staticcheck, unused)
  default: standard
  enable:
    - bodyclose
    - copyloopvar
    - dogsled
    - dupl
    - gochecknoinits
    - goconst
    - gocritic
    - gocyclo
    - goprintffuncname
    - gosec
    - misspell
    - nakedret
    - noctx
    - nolintlint
    - prealloc
    - revive
    - unconvert
    - unparam
    - whitespace

  settings:
    gocyclo:
      min-complexity: 15
    dupl:
      threshold: 150
    goconst:
      min-len: 3
      min-occurrences: 3
    misspell:
      locale: US
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
        - style
    gosec:
      excludes:
        - G101
    revive:
      rules:
        - name: exported
          arguments:
            - "checkPrivateReceivers"

  exclusions:
    # Use common presets
    presets:
      - std-error-handling
      - common-false-positives
    # Custom rules
    rules:
      # Test files — relax rules
      - path: _test\.go
        linters:
          - dupl
          - gosec
          - goconst
          - noctx
          - gocritic
      # Generated deepcopy files
      - path: zz_generated\.
        linters:
          - gocritic
          - gochecknoinits
          - dupl
          - revive
      # Test utilities (Kubebuilder scaffolded)
      - path: test/
        linters:
          - gosec
          - noctx
          - nolintlint
          - gocritic
      # Kubebuilder-generated init() in CRD types and groupversion
      - path: api/v1alpha1/
        linters:
          - gochecknoinits
      # Kubebuilder-generated webhook scaffolding
      - path: internal/webhook/
        linters:
          - gochecknoinits
          - misspell
          - gocritic
      # Kubebuilder-generated controller scaffolding
      - path: internal/controller/
        linters:
          - dupl
      # Kubebuilder-generated main.go
      - path: cmd/main\.go
        linters:
          - gochecknoinits
          - gocritic
    # Exclude generated files completely
    paths:
      - "zz_generated\\.deepcopy\\.go$"

formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/aotanami/aotanami

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
