name: Release Container Image

on:
  push:
    tags:
      - "v*"

# Minimal top-level permissions — each job declares only what it needs.
permissions: {}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: aotanami/aotanami

jobs:
  # ─── Job 1: Build, Push & Sign ───────────────────────────────────────────────
  build:
    name: Build, Push & Sign
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write          # Cosign keyless signing (Fulcio OIDC)
      attestations: write      # GitHub native attestations
    outputs:
      digest: ${{ steps.build-push.outputs.digest }}
      image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build-push.outputs.digest }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0  # v2.12.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392  # v3.6.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2  # v3.10.0

      - name: Log in to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772  # v3.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract OCI metadata
        id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804  # v5.7.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.title=Aotanami
            org.opencontainers.image.description=Autonomous Kubernetes Protection — Powered by Agentic AI
            org.opencontainers.image.vendor=Zelyo AI
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.documentation=https://github.com/aotanami/aotanami/tree/main/docs

      # Reproducible builds: set SOURCE_DATE_EPOCH from the git commit timestamp
      - name: Set SOURCE_DATE_EPOCH
        run: echo "SOURCE_DATE_EPOCH=$(git log -1 --format=%ct)" >> "$GITHUB_ENV"

      - name: Build and push multi-arch image
        id: build-push
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1  # v6.16.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      # ── Cosign keyless signing ──
      - name: Install Cosign
        uses: sigstore/cosign-installer@3454372f43399081ed03b604cb2d021dabca52bb  # v3.8.2

      - name: Sign container image
        run: |
          cosign sign --yes \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build-push.outputs.digest }}"
        env:
          COSIGN_EXPERIMENTAL: "1"

  # ─── Job 2: SBOM, Vulnerability Scan & Attestation ──────────────────────────
  sbom-and-scan:
    name: SBOM, Scan & Attest
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write
      id-token: write          # Cosign attestation
      security-events: write   # Upload SARIF to GitHub Security
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0  # v2.12.0
        with:
          egress-policy: audit

      - name: Install Cosign
        uses: sigstore/cosign-installer@3454372f43399081ed03b604cb2d021dabca52bb  # v3.8.2

      - name: Log in to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772  # v3.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── SBOM generation (dual format) ──
      - name: Install Syft
        uses: anchore/sbom-action/download-syft@e11c554f704a0b820cbf8c51673f6945e0731532  # v0.20.0

      - name: Generate SBOM (SPDX)
        run: |
          syft "${{ needs.build.outputs.image-ref }}" \
            -o spdx-json=sbom-spdx.json

      - name: Generate SBOM (CycloneDX)
        run: |
          syft "${{ needs.build.outputs.image-ref }}" \
            -o cyclonedx-json=sbom-cyclonedx.json

      # ── Attest SBOMs (signed proof of SBOM integrity) ──
      - name: Attest SPDX SBOM
        run: |
          cosign attest --yes \
            --predicate sbom-spdx.json \
            --type spdxjson \
            "${{ needs.build.outputs.image-ref }}"

      - name: Attest CycloneDX SBOM
        run: |
          cosign attest --yes \
            --predicate sbom-cyclonedx.json \
            --type cyclonedx \
            "${{ needs.build.outputs.image-ref }}"

      # ── Vulnerability scanning ──
      - name: Run Grype vulnerability scan
        uses: anchore/scan-action@2c901d5aa7a6f5dfa2c9bf0e206de0fa0d8159fa  # v6.2.0
        id: grype
        with:
          image: ${{ needs.build.outputs.image-ref }}
          fail-build: true
          severity-cutoff: high
          output-format: sarif

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@ff0a06e83cb2de871e5a09832bc6a81e7276941f  # v3.28.18
        with:
          sarif_file: ${{ steps.grype.outputs.sarif }}
          category: container-vulnerability-scan

      # ── Upload SBOMs as workflow artifacts (for release-assets job) ──
      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@ea165f8d65b6db9a8b9c8bb995946ef7572cae71  # v4.6.2
        with:
          name: sbom-artifacts
          path: |
            sbom-spdx.json
            sbom-cyclonedx.json
          retention-days: 90

  # ─── Job 3: SLSA Level 3 Provenance ─────────────────────────────────────────
  provenance:
    name: SLSA Provenance (L3)
    needs: build
    permissions:
      actions: read
      id-token: write
      packages: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.0.0
    with:
      image: ghcr.io/aotanami/aotanami
      digest: ${{ needs.build.outputs.digest }}
      registry-username: ${{ github.actor }}
    secrets:
      registry-password: ${{ secrets.GITHUB_TOKEN }}

  # ─── Job 4: Release Assets ──────────────────────────────────────────────────
  release-assets:
    name: Upload Release Assets
    runs-on: ubuntu-latest
    needs: [build, sbom-and-scan]
    permissions:
      contents: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0  # v2.12.0
        with:
          egress-policy: audit

      - name: Download SBOM artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: sbom-artifacts

      - name: Upload SBOMs to GitHub Release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda  # v2.2.1
        with:
          files: |
            sbom-spdx.json
            sbom-cyclonedx.json
          fail_on_unmatched_files: true
