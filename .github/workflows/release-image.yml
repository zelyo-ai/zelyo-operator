name: Release Container Image

on:
  push:
    tags:
      - "v*"

# Minimal top-level permissions — each job declares only what it needs.
permissions: {}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: zelyo-ai/zelyo-operator

jobs:
  # ─── Job 1: Build, Push & Sign ───────────────────────────────────────────────
  build:
    name: Build, Push & Sign
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write          # Cosign keyless signing (Fulcio OIDC)
      attestations: write      # GitHub native attestations
    outputs:
      digest: ${{ steps.build-push.outputs.digest }}
      image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build-push.outputs.digest }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594  # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a  # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2  # v4.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract OCI metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf  # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.title=Zelyo Operator
            org.opencontainers.image.description=Autonomous Kubernetes Protection — Powered by Agentic AI
            org.opencontainers.image.vendor=Zelyo AI
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.documentation=https://github.com/zelyo-ai/zelyo-operator/tree/main/docs

      # Reproducible builds: set SOURCE_DATE_EPOCH from the git commit timestamp
      - name: Set SOURCE_DATE_EPOCH
        run: echo "SOURCE_DATE_EPOCH=$(git log -1 --format=%ct)" >> "$GITHUB_ENV"

      - name: Build and push multi-arch image
        id: build-push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294  # v7.0.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      # ── Cosign keyless signing ──
      - name: Install Cosign
        uses: sigstore/cosign-installer@ba7bc0a3fef59531c69a25acd34668d6d3fe6f22  # v4.1.0

      - name: Sign container image
        run: |
          cosign sign --yes \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build-push.outputs.digest }}"
        env:
          COSIGN_EXPERIMENTAL: "1"

  # ─── Job 2: SBOM, Vulnerability Scan & Attestation ──────────────────────────
  sbom-and-scan:
    name: SBOM, Scan & Attest
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write
      id-token: write          # Cosign attestation
      security-events: write   # Upload SARIF to GitHub Security
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594  # v2.16.0
        with:
          egress-policy: audit

      - name: Install Cosign
        uses: sigstore/cosign-installer@ba7bc0a3fef59531c69a25acd34668d6d3fe6f22  # v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2  # v4.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── SBOM generation (dual format) ──
      - name: Install Syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0

      - name: Generate SBOM (SPDX)
        run: |
          syft "${{ needs.build.outputs.image-ref }}" \
            -o spdx-json=sbom-spdx.json

      - name: Generate SBOM (CycloneDX)
        run: |
          syft "${{ needs.build.outputs.image-ref }}" \
            -o cyclonedx-json=sbom-cyclonedx.json

      # ── Attest SBOMs (signed proof of SBOM integrity) ──
      - name: Attest SPDX SBOM
        run: |
          cosign attest --yes \
            --predicate sbom-spdx.json \
            --type spdxjson \
            "${{ needs.build.outputs.image-ref }}"

      - name: Attest CycloneDX SBOM
        run: |
          cosign attest --yes \
            --predicate sbom-cyclonedx.json \
            --type cyclonedx \
            "${{ needs.build.outputs.image-ref }}"

      # ── Vulnerability scanning ──
      - name: Run Grype vulnerability scan
        uses: anchore/scan-action@v7
        id: grype
        with:
          image: ${{ needs.build.outputs.image-ref }}
          fail-build: true
          severity-cutoff: critical
          output-format: sarif
          # Only fail on vulnerabilities that have a known fix available.
          # We use distroless/scratch, so any findings are in Go dependencies.
          only-fixed: true

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ steps.grype.outputs.sarif }}
          category: container-vulnerability-scan

      # ── Upload SBOMs as workflow artifacts (for release-assets job) ──
      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v7
        with:
          name: sbom-artifacts
          path: |
            sbom-spdx.json
            sbom-cyclonedx.json
          retention-days: 90

  # ─── Job 3: SLSA Level 3 Provenance ─────────────────────────────────────────
  provenance:
    name: SLSA Provenance (L3)
    needs: build
    permissions:
      actions: read
      id-token: write
      packages: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.1.0
    with:
      image: ghcr.io/zelyo-ai/zelyo-operator
      digest: ${{ needs.build.outputs.digest }}
      registry-username: ${{ github.actor }}
    secrets:
      registry-password: ${{ secrets.GITHUB_TOKEN }}

  # ─── Job 4: Release Assets ──────────────────────────────────────────────────
  release-assets:
    name: Upload Release Assets
    runs-on: ubuntu-latest
    needs: [build, sbom-and-scan]
    permissions:
      contents: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594  # v2.16.0
        with:
          egress-policy: audit

      - name: Download SBOM artifacts
        uses: actions/download-artifact@v8
        with:
          name: sbom-artifacts

      - name: Upload SBOMs to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            sbom-spdx.json
            sbom-cyclonedx.json
          fail_on_unmatched_files: true
