name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write  # Needed for Cosign keyless signing

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: zelyo-ai/aotanami
  HELM_REGISTRY: ghcr.io/zelyo-ai/charts

jobs:
  release-image:
    name: Build, Push & Sign Container Image
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build-push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push multi-arch image
        id: build-push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- Cosign keyless signing ---
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign container image
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build-push.outputs.digest }}

      # --- SBOM generation ---
      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate SBOM (SPDX)
        run: |
          syft ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build-push.outputs.digest }} \
            -o spdx-json=sbom-spdx.json

      - name: Generate SBOM (CycloneDX)
        run: |
          syft ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build-push.outputs.digest }} \
            -o cyclonedx-json=sbom-cyclonedx.json

      - name: Attach SBOM as OCI artifact
        run: |
          cosign attach sbom \
            --sbom sbom-spdx.json \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build-push.outputs.digest }}

      # --- SLSA Provenance attestation ---
      - name: Generate and attach provenance
        run: |
          cat > /tmp/provenance.json << EOF
          {
            "buildType": "https://github.com/zelyo-ai/aotanami",
            "builder": {"id": "https://github.com/zelyo-ai/aotanami/actions"},
            "metadata": {
              "buildInvocationId": "${{ github.run_id }}",
              "completeness": {"parameters": true, "environment": true, "materials": true}
            }
          }
          EOF
          cosign attest --yes \
            --predicate /tmp/provenance.json \
            --type slsaprovenance \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build-push.outputs.digest }}

      # --- Upload SBOMs as release assets ---
      - name: Upload SBOMs to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            sbom-spdx.json
            sbom-cyclonedx.json

  release-helm:
    name: Package, Push & Sign Helm Chart (OCI)
    runs-on: ubuntu-latest
    needs: release-image
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.0

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Log in to GHCR (Helm OCI)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} \
            --username ${{ github.actor }} --password-stdin

      - name: Update chart version
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"  # Strip leading 'v'
          sed -i "s/^version:.*/version: ${VERSION}/" deploy/helm/aotanami/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" deploy/helm/aotanami/Chart.yaml

      - name: Package Helm chart (OCI)
        run: |
          helm package deploy/helm/aotanami/ --destination .helm-packages/

      - name: Push Helm chart to GHCR (OCI)
        run: |
          helm push .helm-packages/aotanami-*.tgz oci://${{ env.HELM_REGISTRY }}

      - name: Sign Helm chart OCI artifact
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          cosign sign --yes \
            ${{ env.HELM_REGISTRY }}/aotanami:${VERSION}
